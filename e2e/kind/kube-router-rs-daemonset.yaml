# kube-router-rs deployed into the local kind cluster as the CNI, NetworkPolicy
# controller, and service proxy. Uses the locally-loaded image
# (kube-router-rs:dev, imagePullPolicy: Never).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-router-rs
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-router-rs
rules:
  - apiGroups: [""]
    resources: [namespaces, pods, services, nodes, endpoints]
    verbs: [list, get, watch]
  - apiGroups: ["networking.k8s.io"]
    resources: [networkpolicies]
    verbs: [list, get, watch]
  - apiGroups: ["discovery.k8s.io"]
    resources: [endpointslices]
    verbs: [get, list, watch]
  - apiGroups: ["coordination.k8s.io"]
    resources: [leases]
    verbs: [get, create, update]
  - apiGroups: [""]
    resources: [services/status]
    verbs: [get, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-router-rs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-router-rs
subjects:
  - kind: ServiceAccount
    name: kube-router-rs
    namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-router-rs
  namespace: kube-system
  labels:
    k8s-app: kube-router-rs
spec:
  selector:
    matchLabels:
      k8s-app: kube-router-rs
  template:
    metadata:
      labels:
        k8s-app: kube-router-rs
    spec:
      serviceAccountName: kube-router-rs
      priorityClassName: system-node-critical
      hostNetwork: true
      hostPID: true
      dnsPolicy: Default
      tolerations:
        - operator: Exists
      containers:
        - name: kube-router-rs
          image: kube-router-rs:dev
          imagePullPolicy: Never
          args:
            - --run-router=true
            - --run-firewall=true
            - --run-service-proxy=true
            - --run-loadbalancer=false
            - --cluster-asn=64512
            - --iptables-sync-period=10s
            - --ipvs-sync-period=10s
            - --metrics-port=8080
            - --health-port=20244
            - -v=1
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: KUBERNETES_SERVICE_HOST
              value: "__KIND_API_HOST__"
            - name: KUBERNETES_SERVICE_PORT
              value: "6443"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 20244
            initialDelaySeconds: 10
            periodSeconds: 15
          securityContext:
            privileged: true
          volumeMounts:
            - name: lib-modules
              mountPath: /lib/modules
              readOnly: true
            - name: xtables-lock
              mountPath: /run/xtables.lock
            - name: cni-bin
              mountPath: /opt/cni/bin
            - name: cni-conf
              mountPath: /etc/cni/net.d
      volumes:
        - name: lib-modules
          hostPath:
            path: /lib/modules
        - name: xtables-lock
          hostPath:
            path: /run/xtables.lock
            type: FileOrCreate
        - name: cni-bin
          hostPath:
            path: /opt/cni/bin
            type: DirectoryOrCreate
        - name: cni-conf
          hostPath:
            path: /etc/cni/net.d
            type: DirectoryOrCreate
