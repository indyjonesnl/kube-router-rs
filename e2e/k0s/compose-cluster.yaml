# Local e2e k0s cluster: 1 controller + 3 workers (no LB — single controller
# publishes the API directly). Derived from k0s docs/compose-cluster.yaml
# (v1.35.5+k0s.0). The 3 workers give cross-node pod networking to validate
# kube-router-rs.
#
# Bring up:   docker compose -f e2e/k0s/compose-cluster.yaml up -d
# Kubeconfig: e2e/k0s/kubeconfig.sh   (writes ~/.kube/k0s-docker.yaml)
# Tear down:  docker compose -f e2e/k0s/compose-cluster.yaml down -v
name: kube-router-rs-k0s

x-k0s-image: &k0s-image docker.io/k0sproject/k0s:v1.35.5-k0s.0

x-k0s-worker: &k0s-worker
  image: *k0s-image
  networks:
    - k0s-net
  depends_on:
    - k0s-controller-1
  command: [k0s, worker, --token-file, /run/secrets/k0sproject.io/tokens/worker]
  volumes:
    - /var/lib/k0s
    - /var/log/pods
    - /dev/kmsg:/dev/kmsg:ro
    - k0s-worker-token:/run/secrets/k0sproject.io/tokens:ro
  tmpfs:
    - /run
    - /tmp
  devices:
    - /dev/kmsg
  # privileged is required so the worker entrypoint can `mount --make-rshared /`
  # for kubelet (CAP_SYS_ADMIN alone is insufficient on modern Docker).
  privileged: true
  security_opt:
    - seccomp:unconfined
  restart: on-failure

networks:
  k0s-net:
    driver: bridge
    # Static subnet so the controller has a fixed IP: konnectivity-agent and
    # kube-router-rs run in the pod/cluster and cannot resolve the docker
    # container name `k0s-controller-1` (docker's embedded DNS is only reachable
    # from the node netns, not pod netns), so the API/konnectivity address must
    # be an IP, not a name.
    ipam:
      config:
        - subnet: 172.31.250.0/24

services:
  k0s-controller-1:
    image: *k0s-image
    container_name: k0s-controller-1
    hostname: k0s-controller-1
    networks:
      k0s-net:
        ipv4_address: 172.31.250.10
    ports:
      - 7443:6443 # publish the API to host :7443 (avoids a :6443 collision on this host)
    tmpfs:
      - /run
      - /tmp
    configs:
      - source: k0s.yaml
        target: /etc/k0s/k0s.yaml
    restart: on-failure
    # --enable-worker needs the same privileged worker runtime the workers use
    # (rshared mount for kubelet, writable cgroup for the worker pre-flight,
    # /dev/kmsg, pod logs) — otherwise k0s aborts with a cgroup/pre-flight error.
    privileged: true
    security_opt:
      - seccomp:unconfined
    devices:
      - /dev/kmsg
    # --enable-worker: run kube-router-rs on the control-plane node too. The
    # apiserver ClusterIP (10.96.0.1) backends to this node, so it must have BGP
    # routes to the worker pod CIDRs to return pod→apiserver traffic; without a
    # kube-router-rs instance here those replies are dropped (coredns/konnectivity
    # never reach the API). The control-plane NoSchedule taint is kept — only the
    # kube-router-rs DaemonSet (tolerations: operator Exists) lands here, not
    # general workloads. Mirrors a real kube-router deployment (runs on all nodes).
    command: [k0s, controller, --enable-worker]
    post_start:
      - command:
          - /bin/sh
          - -euc
          - |
            bootstrap() {
              find /run/secrets/k0sproject.io/worker-token ! -path /run/secrets/k0sproject.io/worker-token -prune -exec rm -rf {} +
              k0s token pre-shared --role worker \
                --cert /var/lib/k0s/pki/ca.crt \
                --url https://172.31.250.10:6443 \
                --out /run/secrets/k0sproject.io/worker-token/

              mv /run/secrets/k0sproject.io/worker-token/*.yaml /var/lib/k0s/manifests/k0s-token-secrets/worker.yaml
              mv /run/secrets/k0sproject.io/worker-token/token_* /run/secrets/k0sproject.io/worker-token/worker
            }

            while [ ! -f /var/lib/k0s/pki/ca.crt ] || ! bootstrap; do
              sleep 1
            done
    volumes:
      - /var/lib/k0s
      - /var/log/pods
      - /dev/kmsg:/dev/kmsg:ro
      - k0s-token-secrets:/var/lib/k0s/manifests/k0s-token-secrets
      - k0s-worker-token:/run/secrets/k0sproject.io/worker-token

  k0s-worker-1:
    <<: *k0s-worker
    container_name: k0s-worker-1
    hostname: k0s-worker-1

  k0s-worker-2:
    <<: *k0s-worker
    container_name: k0s-worker-2
    hostname: k0s-worker-2

  k0s-worker-3:
    <<: *k0s-worker
    container_name: k0s-worker-3
    hostname: k0s-worker-3

volumes:
  k0s-token-secrets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
  k0s-worker-token:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs

configs:
  k0s.yaml:
    content: |
      spec:
        api:
          externalAddress: 172.31.250.10
          sans:
            - 172.31.250.10
            - k0s-controller-1
            - 127.0.0.1
            - localhost
        storage:
          type: kine # SQLite-backed (kine) instead of etcd — far lower memory; fine for a single controller
        network:
          provider: custom # disable k0s's bundled (Go) kube-router; kube-router-rs is the CNI
          kubeProxy:
            disabled: true # kube-router-rs provides the service proxy (IPVS); avoid double-programming
          # k0s still allocates per-node podCIDRs from this range for our agent to consume.
          podCIDR: 10.244.0.0/16
          serviceCIDR: 10.96.0.0/12
