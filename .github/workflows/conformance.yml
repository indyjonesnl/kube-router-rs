name: Conformance

# Build kube-router-rs ONCE, then run every (area x cluster) conformance job off
# the same prebuilt image. Previously each of the 4 areas x 2 clusters = 8 jobs
# compiled from scratch; now a single `build` job produces the deploy image,
# `docker save`s it to an artifact, and the 8 test jobs `docker load` it and skip
# their own build (KR_SKIP_BUILD=1). Every test job waited on compilation anyway,
# so gating them on one shared build doesn't lengthen the critical path.

on:
  push: { branches: [main] }
  workflow_dispatch:
  schedule: [{ cron: '0 6 * * 1' }]  # weekly, Mon 06:00 UTC

permissions:
  contents: read

concurrency:
  group: conformance
  cancel-in-progress: true

jobs:
  build:
    name: build image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # deploy image copies a host-built binary; kr-bgp's build script compiles
      # the BGP gRPC protos with protoc. Mirrors ci.yml.
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libprotobuf-dev

      - name: Install Rust toolchain
        run: rustup show active-toolchain || rustup toolchain install stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: conformance-cargo-${{ hashFiles('Cargo.lock') }}

      # Reproduce the k0s deploy build (host binary -> ubuntu:24.04 image). The
      # resulting amd64 image is functionally identical for both clusters in CI.
      - name: Build release binary
        run: cargo build --release

      - name: Stage binary + gobgp for the image
        run: |
          install -m 0755 target/release/kube-router-rs e2e/k0s/kube-router-rs
          ./e2e/k0s/fetch-gobgp.sh

      - name: Build deploy image
        run: docker build -f e2e/k0s/Dockerfile.deploy -t kube-router-rs:dev e2e/k0s

      - name: Save image to artifact
        run: docker save kube-router-rs:dev -o "$RUNNER_TEMP/kube-router-rs-image.tar"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: kube-router-rs-image
          path: ${{ runner.temp }}/kube-router-rs-image.tar
          retention-days: 1
          if-no-files-found: error

  conformance:
    name: ${{ matrix.area.name }} / ${{ matrix.cluster }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        cluster: [k0s, kind]
        area:
          - name: services
            focus: '\[sig-network\].*Services.*\[Conformance\]'
            skip:  '\[Serial\]'
          - name: dns
            focus: '\[sig-network\].*DNS.*\[Conformance\]'
            skip:  '\[Serial\]'
          - name: network
            focus: '\[sig-network\].*(Networking|Granular|Pods should).*\[Conformance\]'
            skip:  '\[Serial\]'
          - name: netpol
            focus: '\[Feature:NetworkPolicy\]'
            skip:  '\[Serial\]|\[Slow\]'
    env:
      # Deploy scripts skip their own cargo build / docker build and use the
      # image we docker-load from the shared artifact.
      KR_SKIP_BUILD: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - uses: actions/setup-go@v5
        with: { go-version: 'stable' }

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: kube-router-rs-image
          path: ${{ runner.temp }}

      - name: Load prebuilt image
        run: docker load -i "$RUNNER_TEMP/kube-router-rs-image.tar"

      - name: Install kind
        if: matrix.cluster == 'kind'
        run: |
          go install sigs.k8s.io/kind@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Bring up dockerized k0s cluster
        if: matrix.cluster == 'k0s'
        run: |
          # Same-node pod->ClusterIP->pod replies are un-DNAT'd (source restored to
          # the service VIP) by conntrack only when bridge-nf-call-iptables=1, which
          # requires the br_netfilter module. The stock k0s node image doesn't load
          # it (kind's node image does), and the node containers lack the module
          # files so kube-router-rs's in-pod modprobe can't load it either. Load it
          # on the runner host BEFORE the node netns are created — they inherit the
          # module's default (bridge-nf-call-iptables=1). Without this, same-node DNS
          # replies arrive from the CoreDNS pod IP instead of the kube-dns VIP
          # ("reply from unexpected source"), intermittently flaking name-based
          # conformance tests whenever IPVS picks the co-located backend.
          sudo modprobe br_netfilter
          docker compose -f e2e/k0s/compose-cluster.yaml up -d

      - name: Bring up kind cluster
        if: matrix.cluster == 'kind'
        run: kind create cluster --config e2e/kind/cluster.yaml

      - name: Deploy kube-router-rs to k0s + gate on Ready
        if: matrix.cluster == 'k0s'
        run: ./e2e/k0s/deploy.sh "$RUNNER_TEMP/kubeconfig.yaml"

      - name: Deploy kube-router-rs to kind + gate on Ready
        if: matrix.cluster == 'kind'
        run: ./e2e/kind/deploy.sh "$RUNNER_TEMP/kubeconfig.yaml"

      - name: Install hydrophone
        run: go install sigs.k8s.io/hydrophone@latest

      - name: Run conformance (${{ matrix.area.name }})
        env:
          KUBECONFIG: ${{ runner.temp }}/kubeconfig.yaml
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/out"
          # Pin the conformance image to the cluster's k8s version (strip the +k0s suffix).
          ver="$(kubectl version -o json | python3 -c 'import sys,json;print(json.load(sys.stdin)["serverVersion"]["gitVersion"].split("+")[0])')"
          echo "conformance image version: $ver"
          args=( --focus "${{ matrix.area.focus }}"
                 --conformance-image "registry.k8s.io/conformance:${ver}"
                 --output-dir "$RUNNER_TEMP/out" )
          if [ -n "${{ matrix.area.skip }}" ]; then args+=( --skip "${{ matrix.area.skip }}" ); fi
          "$(go env GOPATH)/bin/hydrophone" "${args[@]}"

      - name: Collect logs on failure
        if: always()
        env:
          KUBECONFIG: ${{ runner.temp }}/kubeconfig.yaml
        run: |
          # out/ may not exist yet if the deploy step failed before the run step
          # created it — make it so the diagnostics below are actually captured.
          mkdir -p "$RUNNER_TEMP/out"
          kubectl get nodes -o wide | tee "$RUNNER_TEMP/out/nodes.txt" || true
          kubectl get pods -A -o wide | tee "$RUNNER_TEMP/out/pods.txt" || true
          kubectl -n kube-system describe pods -l k8s-app=kube-router-rs > "$RUNNER_TEMP/out/kube-router-rs-describe.txt" 2>&1 || true
          kubectl -n kube-system logs ds/kube-router-rs --all-containers --tail=400 > "$RUNNER_TEMP/out/kube-router-rs.log" 2>&1 || true
          kubectl -n kube-system logs ds/kube-router-rs --all-containers --previous --tail=400 > "$RUNNER_TEMP/out/kube-router-rs-previous.log" 2>&1 || true
          kubectl -n kube-system logs deploy/coredns --tail=200 > "$RUNNER_TEMP/out/coredns.log" 2>&1 || true
          # Per-node netfilter state — confirms bridge-nf-call-iptables/br_netfilter
          # (the same-node un-DNAT prerequisite) and vs.conntrack are actually set.
          if [ "${{ matrix.cluster }}" = "k0s" ]; then
            for n in k0s-controller-1 k0s-worker-1 k0s-worker-2 k0s-worker-3; do
              echo "== $n =="
              docker exec "$n" sh -c '
                echo -n "bridge-nf-call-iptables="; cat /proc/sys/net/bridge/bridge-nf-call-iptables 2>/dev/null || echo MISSING
                echo -n "br_netfilter="; (lsmod 2>/dev/null | grep -q br_netfilter && echo loaded) || echo absent
                echo -n "vs.conntrack="; cat /proc/sys/net/ipv4/vs/conntrack 2>/dev/null || echo MISSING' 2>&1
            done > "$RUNNER_TEMP/out/node-netfilter.txt" 2>&1 || true
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-${{ matrix.area.name }}-${{ matrix.cluster }}
          path: ${{ runner.temp }}/out
          if-no-files-found: warn

      - name: Tear down k0s
        if: always() && matrix.cluster == 'k0s'
        run: docker compose -f e2e/k0s/compose-cluster.yaml down -v

      - name: Tear down kind
        if: always() && matrix.cluster == 'kind'
        run: kind delete cluster --name kube-router-rs
