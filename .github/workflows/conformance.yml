name: Conformance (reusable)

on:
  workflow_call:
    inputs:
      area:   { required: true, type: string }   # e.g. "services" (artifact + display name)
      focus:  { required: true, type: string }   # ginkgo --focus regex
      skip:   { required: false, type: string, default: "" }  # ginkgo --skip regex
      clusters:
        required: false
        type: string
        default: '["k0s","kind"]'

permissions:
  contents: read

concurrency:
  group: conformance-${{ inputs.area }}
  cancel-in-progress: true

jobs:
  conformance:
    name: ${{ inputs.area }} / ${{ matrix.cluster }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        cluster: ${{ fromJSON(inputs.clusters) }}
    steps:
      - uses: actions/checkout@v4

      # deploy.sh builds the agent from source (`cargo build --release`), and
      # kr-bgp's build script compiles the BGP gRPC protos with protoc. Without
      # it the build fails and the node never comes Ready. Mirrors ci.yml.
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libprotobuf-dev

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - uses: actions/setup-go@v5
        with: { go-version: 'stable' }

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: conformance-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Install kind
        if: matrix.cluster == 'kind'
        run: |
          go install sigs.k8s.io/kind@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Bring up dockerized k0s cluster
        if: matrix.cluster == 'k0s'
        run: docker compose -f e2e/k0s/compose-cluster.yaml up -d

      - name: Bring up kind cluster
        if: matrix.cluster == 'kind'
        run: kind create cluster --config e2e/kind/cluster.yaml

      - name: Deploy kube-router-rs to k0s + gate on Ready
        if: matrix.cluster == 'k0s'
        run: ./e2e/k0s/deploy.sh "$RUNNER_TEMP/kubeconfig.yaml"

      - name: Deploy kube-router-rs to kind + gate on Ready
        if: matrix.cluster == 'kind'
        run: ./e2e/kind/deploy.sh "$RUNNER_TEMP/kubeconfig.yaml"

      - name: Install hydrophone
        run: go install sigs.k8s.io/hydrophone@latest

      - name: Run conformance (${{ inputs.area }})
        env:
          KUBECONFIG: ${{ runner.temp }}/kubeconfig.yaml
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/out"
          # Pin the conformance image to the cluster's k8s version (strip the +k0s suffix).
          ver="$(kubectl version -o json | python3 -c 'import sys,json;print(json.load(sys.stdin)["serverVersion"]["gitVersion"].split("+")[0])')"
          echo "conformance image version: $ver"
          args=( --focus "${{ inputs.focus }}"
                 --conformance-image "registry.k8s.io/conformance:${ver}"
                 --output-dir "$RUNNER_TEMP/out" )
          if [ -n "${{ inputs.skip }}" ]; then args+=( --skip "${{ inputs.skip }}" ); fi
          "$(go env GOPATH)/bin/hydrophone" "${args[@]}"

      - name: Collect logs on failure
        if: always()
        env:
          KUBECONFIG: ${{ runner.temp }}/kubeconfig.yaml
        run: |
          # out/ may not exist yet if the deploy step failed before the run step
          # created it — make it so the diagnostics below are actually captured.
          mkdir -p "$RUNNER_TEMP/out"
          kubectl get nodes -o wide | tee "$RUNNER_TEMP/out/nodes.txt" || true
          kubectl get pods -A -o wide | tee "$RUNNER_TEMP/out/pods.txt" || true
          kubectl -n kube-system describe pods -l k8s-app=kube-router-rs > "$RUNNER_TEMP/out/kube-router-rs-describe.txt" 2>&1 || true
          kubectl -n kube-system logs ds/kube-router-rs --all-containers --tail=400 > "$RUNNER_TEMP/out/kube-router-rs.log" 2>&1 || true
          kubectl -n kube-system logs ds/kube-router-rs --all-containers --previous --tail=400 > "$RUNNER_TEMP/out/kube-router-rs-previous.log" 2>&1 || true
          kubectl -n kube-system logs deploy/coredns --tail=200 > "$RUNNER_TEMP/out/coredns.log" 2>&1 || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-${{ inputs.area }}-${{ matrix.cluster }}
          path: ${{ runner.temp }}/out
          if-no-files-found: warn

      - name: Tear down k0s
        if: always() && matrix.cluster == 'k0s'
        run: docker compose -f e2e/k0s/compose-cluster.yaml down -v

      - name: Tear down kind
        if: always() && matrix.cluster == 'kind'
        run: kind delete cluster --name kube-router-rs
