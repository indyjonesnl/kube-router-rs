name: Conformance / DNS
on:
  push: { branches: [main] }
  workflow_dispatch:
  schedule: [{ cron: '15 6 * * 1' }]
permissions:
  contents: read
jobs:
  dns:
    uses: ./.github/workflows/conformance.yml
    with:
      area: dns
      focus: '\[sig-network\].*DNS.*\[Conformance\]'
      skip:  '\[Serial\]'
